name: EviCore Guideline Watchdog

on:
  schedule:
    - cron: '0 9 * * *' # Runs EVERY DAY at 09:00 AM
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        id: scraper
        run: |
          python .github/check_guidelines.py >> $GITHUB_OUTPUT

      - name: Notify Jay Green
        # Logic: No 'if' condition here means it ALWAYS sends the email
        uses: imjohnbo/issue-bot@v3
        with:
          title: "Watchdog Report: [New Changes = ${{ steps.scraper.outputs.NEW_GUIDELINE_FOUND }}]"
          body: |
            Hi @${{ github.actor }}, 

            The Daily EviCore Guideline check has completed. 
            
            **Daily Status:**
            - **Updates Found:** ${{ steps.scraper.outputs.NEW_GUIDELINE_FOUND }}
            - **Current Link:** ${{ steps.scraper.outputs.URL }}
            
            If 'Updates Found' is true, the automation suite mock data should be reviewed for potential logic drift.
          assignees: "${{ github.actor }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Updated URL
       
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          git add last_known_guideline.txt
          git commit -m "Update last known EviCore guideline URL [skip ci]"
          git push
