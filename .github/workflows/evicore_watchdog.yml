name: EviCore Guideline Watchdog

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt-in to the 2026 standard

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4 is fine with the ENV variable above

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12' # Move to a newer Python for 2026

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        id: scraper
        run: python .github/check_guidelines.py

      - name: Notify Jay Green
        uses: imjohnbo/issue-bot@v3
        with:
          title: "Watchdog Report: [New Changes = ${{ steps.scraper.outputs.NEW_GUIDELINE_FOUND }}]"
          body: |
            Hi @${{ github.actor }}, 

            **Daily Status Update:**
            - **Updates Found:** ${{ steps.scraper.outputs.NEW_GUIDELINE_FOUND }}
            - **Current Link:** ${{ steps.scraper.outputs.URL }}
          assignees: "${{ github.actor }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Updated URL
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          git add last_known_guideline.txt
          git commit -m "Update last known EviCore guideline URL [skip ci]"
          git push
