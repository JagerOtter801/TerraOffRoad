name: EviCore Guideline Watchdog

on:
  schedule:
    - cron: '0 9 * * 1' # Runs at 09:00 every Monday
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        id: scraper
        # Using the path where you placed the script
        run: |
          python .github/workflows/check_guidelines.py >> $GITHUB_OUTPUT

      - name: Notify via GitHub Issue
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        uses: imjohnbo/issue-bot@v3
        with:
          title: "🚨NOTICE OF UPDATE TO RULES: New EviCore Guideline Detected"
          body: |
            A new Oncology Imaging Guideline has been detected on the EviCore site.
            
            **New URL:** ${{ steps.scraper.outputs.URL }}
            **Detected on:** ${{ github.event.repository.updated_at }}
            
            Action required: Update the automation suite mock data and validation logic for the February 2026 guidelines (V1.0.2026).
          assignees: "${{ github.actor }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Updated URL
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          # This ensures the script doesn't notify you twice for the same link
          git add last_known_guideline.txt
          git commit -m "Update last known EviCore guideline URL [skip ci]"
          git push
