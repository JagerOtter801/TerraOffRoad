name: EviCore Guideline Watchdog

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM
  workflow_dispatch: # Allows you to run it manually to test the email right now

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        id: scraper
        run: |
          python .github/check_guidelines.py >> $GITHUB_OUTPUT

      - name: Notify Jay Green
        # Removed the 'if' condition so this always runs
        uses: imjohnbo/issue-bot@v3
        with:
          # Subject line will now show 'true' or 'false' for new changes
          title: "Watchdog Report: Changes Found = ${{ steps.scraper.outputs.NEW_GUIDELINE_FOUND }}"
          body: |
            Hi @${{ github.actor }}, 

            The EviCore Watchdog job has completed. 
            
            **Status Update:**
            - **New Changes Found:** ${{ steps.scraper.outputs.NEW_GUIDELINE_FOUND }}
            - **Current Guideline URL:** ${{ steps.scraper.outputs.URL }}
            
            This is a temporary notification to confirm the GitHub Action is firing correctly to jay.green@waystar.com.
          assignees: "${{ github.actor }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Updated URL
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          git add last_known_guideline.txt
          git commit -m "Update last known EviCore guideline URL [skip ci]"
          git push
