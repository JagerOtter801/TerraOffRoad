name: EviCore Guideline Watchdog

on:
  schedule:
    - cron: '0 9 * * 1' # Runs at 09:00 every Monday
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  check-guidelines:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        id: scraper
        run: python .github/workflows/check_guidelines.py >> $GITHUB_OUTPUT

      - name: Notify Slack if Updated
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "🚨 New EviCore Guideline Detected!\nURL: ${{ steps.scraper.outputs.URL }}"
          SLACK_TITLE: "Guideline Update Alert"

      - name: Commit Updated URL
        if: steps.scraper.outputs.NEW_GUIDELINE_FOUND == 'true'
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          git add last_known_guideline.txt
          git commit -m "Update last known EviCore guideline URL"
          git push
